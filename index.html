<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pagos - Jimmy</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        .pago-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .pago-info { display: flex; flex-direction: column; }
        .pago-nombre { font-weight: bold; color: #333; }
        .pago-fecha { font-size: 0.85em; color: #7f8c8d; }
        
        .monto-input { width: 80px; padding: 5px; border: 1px solid #ddd; border-radius: 5px; text-align: right; }
        
        .btn-check {
            background: #ddd;
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-check.pagado { background: var(--accent); color: white; }
        
        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mis Pagos - Abril 2026</h2>
    
    <div id="lista-pagos">
        <div class="pago-item">
            <div class="pago-info">
                <span class="pago-nombre">GAS</span>
                <span class="pago-fecha">Vence: 26 de cada mes</span>
            </div>
            <input type="number" class="monto-input" value="45.00">
            <button class="btn-check" onclick="this.classList.toggle('pagado')">✓</button>
        </div>

        <div class="pago-item">
            <div class="pago-info">
                <span class="pago-nombre">LUZ (378539)</span>
                <span class="pago-fecha">Vence: 19-20</span>
            </div>
            <input type="number" class="monto-input" value="83.30">
            <button class="btn-check" onclick="this.classList.toggle('pagado')">✓</button>
        </div>

        <div class="pago-item">
            <div class="pago-info">
                <span class="pago-nombre">Internet</span>
                <span class="pago-fecha">Vence: 31</span>
            </div>
            <input type="number" class="monto-input" value="60.90">
            <button class="btn-check" onclick="this.classList.toggle('pagado')">✓</button>
        </div>
    </div>

    <div class="total-box">
        Total Pendiente: S/ <span id="total-monto">189.20</span>
    </div>
</div>

</body>
</html>
