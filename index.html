<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pagos Jimmy - Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f8f9fa;
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .nav-mes { display: flex; justify-content: space-between; align-items: center; background: #eee; border-radius: 10px; padding: 8px; margin-bottom: 15px; }
        .btn-nav { border: none; background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* Formulario para agregar */
        .form-add { background: #f1f1f1; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #ccc; }
        .form-add input { width: 90%; margin: 5px 0; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
        .btn-add { background: var(--accent); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* Tarjetas */
        .pago-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; transition: 0.3s; }
        .pago-card.pagado { border-left: 6px solid var(--accent); background: #f0fff4; }
        .pago-header { display: flex; justify-content: space-between; align-items: center; }
        
        .info-txt { flex: 1; }
        .nombre { font-weight: bold; font-size: 1.1em; display: block; }
        .fecha-guia { font-size: 0.8em; color: #666; }

        .btn-group { display: flex; align-items: center; gap: 10px; }
        .btn-check { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 1.2em; }
        .btn-check.activo { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.9em; }

        /* Barra de Tiempo */
        .progreso-container { background: #eee; height: 6px; border-radius: 3px; margin-top: 10px; }
        .progreso-bar { height: 100%; background: var(--accent); border-radius: 3px; }
        .progreso-bar.urgente { background: var(--danger); }

        /* Footer */
        .resumen-footer { margin-top: 20px; padding: 15px; background: var(--primary); color: white; border-radius: 15px; text-align: center; }
        .mensaje-exito { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Mi Gestor Jimmy</h2>
        <div class="nav-mes">
            <button class="btn-nav" onclick="cambiarMes(-1)">◀</button>
            <span id="label-mes" style="font-weight: bold;">ABRIL 2026</span>
            <button class="btn-nav" onclick="cambiarMes(1)">▶</button>
        </div>
    </div>

    <div class="form-add">
        <strong>+ Agregar Nuevo Pago</strong>
        <input type="text" id="new-nombre" placeholder="Nombre (Ej. Arbitrios)">
        <input type="number" id="new-monto" placeholder="Monto S/">
        <input type="number" id="new-dia" placeholder="Día de vencimiento (1-31)">
        <button class="btn-add" onclick="agregarServicio()">Guardar en la lista</button>
    </div>

    <div id="lista-servicios"></div>

    <div class="resumen-footer">
        <div style="font-size: 0.9em; opacity: 0.8;">Total Restante:</div>
        <div id="total-restante" style="font-size: 1.8em; font-weight: bold;">S/ 0.00</div>
    </div>

    <div id="mensaje-exito" class="mensaje-exito">
        ¡Todo pagado! Eres un crack de las finanzas. 🎯✅
    </div>
</div>

<script>
    // 1. CARGAR DATOS INICIALES O DE LOCALSTORAGE
    let servicios = JSON.parse(localStorage.getItem('servicios_jimmy')) || [
        { id: Date.now(), nombre: "GAS", monto: 45.00, diaVence: 26 },
        { id: Date.now()+1, nombre: "LUZ", monto: 83.30, diaVence: 19 },
        { id: Date.now()+2, nombre: "CEL JIMMY", monto: 34.95, diaVence: 22 },
        { id: Date.now()+3, nombre: "FONDEZURCO", monto: 189.80, diaVence: 16 }
    ];

    let pagosRealizados = JSON.parse(localStorage.getItem('pagos_jimmy')) || {};
    let fechaNavegacion = new Date(); // Mes actual

    function render() {
        const listado = document.getElementById('lista-servicios');
        listado.innerHTML = '';
        let sumaRestante = 0;
        let todosPagados = true;
        
        const hoy = new Date();
        const mesKey = `${fechaNavegacion.getMonth()}-${fechaNavegacion.getFullYear()}`;

        // Ordenar por día de vencimiento
        servicios.sort((a, b) => a.diaVence - b.diaVence);

        servicios.forEach(s => {
            const idCompuesto = `${mesKey}-${s.id}`;
            const estaPagado = pagosRealizados[idCompuesto] || false;
            
            if (!estaPagado) {
                sumaRestante += parseFloat(s.monto);
                todosPagados = false;
            }

            const diasFaltan = s.diaVence - hoy.getDate();
            let porcentaje = 100 - (diasFaltan * 7);
            porcentaje = Math.min(Math.max(porcentaje, 5), 100);

            listado.innerHTML += `
                <div class="pago-card ${estaPagado ? 'pagado' : ''}">
                    <div class="pago-header">
                        <div class="info-txt">
                            <span class="nombre">${s.nombre}</span>
                            <span class="fecha-guia">
                                ${estaPagado ? '✅ Pagado' : `Vence el día ${s.diaVence} (${diasFaltan > 0 ? 'Faltan '+diasFaltan+' días' : 'Vence hoy o ya venció'})`}
                            </span>
                        </div>
                        <div class="btn-group">
                            <div style="text-align: right">
                                <b style="display:block">S/ ${parseFloat(s.monto).toFixed(2)}</b>
                                <button class="btn-del" onclick="eliminarServicio(${s.id})">eliminar</button>
                            </div>
                            <button class="btn-check ${estaPagado ? 'activo' : ''}" onclick="togglePago('${idCompuesto}')">
                                ${estaPagado ? '✓' : ''}
                            </button>
                        </div>
                    </div>
                    ${!estaPagado ? `
                        <div class="progreso-container">
                            <div class="progreso-bar ${diasFaltan <= 3 ? 'urgente' : ''}" style="width: ${porcentaje}%"></div>
                        </div>
                    ` : ''}
                </div>
            `;
        });

        document.getElementById('total-restante').innerText = `S/ ${sumaRestante.toFixed(2)}`;
        document.getElementById('mensaje-exito').style.display = (todosPagados && servicios.length > 0) ? 'block' : 'none';
        
        // Guardar en memoria del navegador
        localStorage.setItem('servicios_jimmy', JSON.stringify(servicios));
        localStorage.setItem('pagos_jimmy', JSON.stringify(pagosRealizados));
    }

    // Funciones de Gestión
    function agregarServicio() {
        const nom = document.getElementById('new-nombre').value;
        const mon = document.getElementById('new-monto').value;
        const dia = document.getElementById('new-dia').value;

        if(nom && mon && dia) {
            servicios.push({ id: Date.now(), nombre: nom.toUpperCase(), monto: parseFloat(mon), diaVence: parseInt(dia) });
            render();
            // Limpiar campos
            document.getElementById('new-nombre').value = '';
            document.getElementById('new-monto').value = '';
            document.getElementById('new-dia').value = '';
        } else { alert("Por favor completa todos los datos"); }
    }

    function eliminarServicio(id) {
        if(confirm("¿Eliminar este servicio de la lista permanente?")) {
            servicios = servicios.filter(s => s.id !== id);
            render();
        }
    }

    function togglePago(idCompuesto) {
        pagosRealizados[idCompuesto] = !pagosRealizados[idCompuesto];
        render();
    }

    function cambiarMes(dir) {
        fechaNavegacion.setMonth(fechaNavegacion.getMonth() + dir);
        const nombresMeses = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
        document.getElementById('label-mes').innerText = `${nombresMeses[fechaNavegacion.getMonth()]} ${fechaNavegacion.getFullYear()}`;
        render();
    }

    render();
</script>
</body>
</html>
